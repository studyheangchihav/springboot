<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-shell">
        <header>
            <h1>Todo List</h1>
            <p>Simple CRUD app: create, view, update, delete todos.</p>
        </header>

        <section class="panel">
            <h2>Create / Update Todo</h2>
            <form id="todo-form">
                <input type="hidden" id="todo-id">
                <div class="field">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="Enter title">
                </div>
                <div class="field">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" placeholder="Enter description"></textarea>
                </div>
                <div class="field">
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="HIGH">High</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                </div>
                <div class="field checkbox-field">
                    <label>
                        <input type="checkbox" id="completed">
                        Completed
                    </label>
                </div>
                <div class="actions">
                    <button type="submit">Save</button>
                    <button type="button" id="reset-button" class="secondary">Clear</button>
                </div>
            </form>
        </section>

            <section class="panel">
            <h2>Todos</h2>
            <div id="message" class="message"></div>
            <div id="todo-list" class="todo-list"></div>
        </section>
    </div>

    <div class="modal-overlay" id="detail-modal" hidden>
        <div class="modal">
            <div class="modal-header">
                <h3>Todo Details</h3>
                <button class="modal-close" id="detail-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="detail-grid">
                    <div><strong>ID:</strong> <span id="detail-id"></span></div>
                    <div><strong>Title:</strong> <span id="detail-title"></span></div>
                    <div><strong>Description:</strong> <span id="detail-description"></span></div>
                    <div><strong>Priority:</strong> <span id="detail-priority"></span></div>
                    <div><strong>Completed:</strong> <span id="detail-completed"></span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="detail-close-btn" class="secondary">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal" hidden>
        <div class="modal">
            <div class="modal-header">
                <h3 id="edit-modal-title">Edit Todo</h3>
                <button class="modal-close" id="edit-modal-close">&times;</button>
            </div>
            <form id="edit-form" class="modal-body">
                <input type="hidden" id="edit-todo-id">
                <div class="field">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" required placeholder="Enter title">
                </div>
                <div class="field">
                    <label for="edit-description">Description</label>
                    <textarea id="edit-description" rows="3" placeholder="Enter description"></textarea>
                </div>
                <div class="field">
                    <label for="edit-priority">Priority</label>
                    <select id="edit-priority">
                        <option value="HIGH">High</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                </div>
                <div class="field checkbox-field">
                    <label>
                        <input type="checkbox" id="edit-completed">
                        Completed
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="submit">Save changes</button>
                    <button type="button" id="edit-cancel" class="secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
